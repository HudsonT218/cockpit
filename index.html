<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Favicon (modern browsers) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS "Add to Home Screen" — standalone app on the home screen -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cockpit" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme + meta -->
    <meta name="theme-color" content="#0a0a0b" />
    <meta
      name="description"
      content="Cockpit — your personal projects, tasks, and day planner."
    />
    <meta property="og:title" content="Cockpit" />
    <meta
      property="og:description"
      content="Personal projects, tasks, and day planner."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Cockpit — Personal Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
